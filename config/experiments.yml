ConvAEPredHeads:
  static_params:
    model:
      name: ConvAEPredHeads
      latent_dim: 32
      hidden_dims: [16]
      kernel_size: 3
    training:
      reproducibility:
        deterministic: false
  exp_params:
    data:
      data:
        use_bio_levels: [['ABeta', 'Tau'], ['ABeta'], ['Tau']]
    model:
      pred_head_type: [avg, conv, conv_no_hidden, temp_pool, gated_temp_pool]
    # training:
    #   reproducibility:
    #     seed: [42, 100, 1, 111, 1007]


ConvVAEPredHeads:
  static_params:
    model:
      name: ConvVAEPredHeads
      latent_dim: 32
      hidden_dims: [32, 16]
      kernel_size: 3
    training:
      reproducibility:
        deterministic: false
      loss_params:
        beta: 1.0
  exp_params:
    data:
      data:
        use_bio_levels: [['ABeta', 'Tau'], ['ABeta'], ['Tau']]
    model:
      pred_head_type: [avg, conv, conv_no_hidden, temp_pool, gated_temp_pool]
