default:
  data:
    data:
      batch_size: 32
      groups: [HC, MCI, AD]
      random_seed: 42
      datasplit_file: data/train_val_test_split.csv
      datasplit_mode: load
      normalize: true
      transpose: false
      pad_features: false
      truncate_features: false
      flatten: true
      timepoints_as_samples: false
      fc_input: false
      preserve_timepoints: true

    filter:
      apply_demean: true
      apply_detrend: true
      apply_finalDetrend: false
      fhi: 0.08
      flp: 0.01
      k: 2
      remove_artifacts: true
      tr: 3000
      type: BandPassFilter
  model:
    freeze_encoder: false
    reset_decoder: false
  training:
    num_epochs: 30
    save_dir: ./models
    learning_rate: 1e-3
    weight_decay: 1e-4
    reproducibility:
      enabled: true
      seed: 42
      deterministic: true
      warn_only: false
      benchmark: false
    loss_params:
      loss_per_feature: true
      swfcd_beta: 0
      swfcd_window: 30
      swfcd_step: 3
    convergence_patience: 10
    convergence_min_delta: 1e-4
    convergence_warmup_epochs: 10


LinearAETimeSharedPredHeads:
  static_params:
    model:
      name: LinearAETimeSharedPredHeads
    training:
      num_epochs: 1000
  exp_params:
    data:
      data:
        use_bio_levels: [['ABeta', 'Tau'], ['ABeta'], ['Tau']]
    model:
      latent_dim: [16, 8, 4]
      pred_head_type: [avg, conv, conv_no_hidden, temp_pool, gated_temp_pool]
    training:
      loss_params:
        pred_heads_delta: [1, 0.5]


BasicVAETimeSharedPredHeads:
  static_params:
    model:
      name: BasicVAETimeSharedPredHeads
    training:
      num_epochs: 120
  exp_params:
    data:
      data:
        use_bio_levels: [['ABeta', 'Tau'], ['ABeta'], ['Tau']]
    model:
      latent_dim: [16, 8, 4]
      hidden_dims: [[6304, 3152], [6304], [3152]]
      pred_head_type: [avg, conv, conv_no_hidden, temp_pool, gated_temp_pool]
    training:
      loss_params:
        pred_heads_delta: [1, 0.5]