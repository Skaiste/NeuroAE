default:
  data:
    data:
      batch_size: 32
      groups: [HC, MCI, AD]
      random_seed: 42
      datasplit_file: data/train_val_test_split.csv
      datasplit_mode: load
      normalize: true
      transpose: true
      pad_features: false
      truncate_features: false
      flatten: false
      timepoints_as_samples: false
      fc_input: false
      preserve_timepoints: false

    filter:
      apply_demean: true
      apply_detrend: true
      apply_finalDetrend: false
      fhi: 0.08
      flp: 0.01
      k: 2
      remove_artifacts: true
      tr: 3000
      type: BandPassFilter
  model:
    freeze_encoder: false
    reset_decoder: false
  training:
    num_epochs: 1000
    save_dir: ./models
    learning_rate: 1e-3
    weight_decay: 1e-4
    loss_params:
      loss_per_feature: true
      swfcd_beta: 0
      swfcd_window: 30
      swfcd_step: 3
    convergence_patience: 10
    convergence_min_delta: 1e-4
    convergence_warmup_epochs: 10
    reproducibility:
      benchmark: false
      deterministic: true
      enabled: true
      seed: 42
      warn_only: false


LAE:
  static_params:
    model:
      name: LAE
  exp_params:
    model:
      latent_dim: [32, 16, 8, 4]
    training:
      reproducibility:
        seed: [42, 100, 1, 111, 1007]


LAE:
  static_params:
    model:
      name: LAE
  exp_params:
    model:
      latent_dim: [32, 16, 8, 4]
    training:
      reproducibility:
        seed: [42, 100, 1, 111, 1007]
  

VAE:
  static_params:
    model:
      name: VAE
  exp_params:
