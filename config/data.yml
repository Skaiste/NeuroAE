data:
  batch_size: 32
  datasplit_file: data/train_val_test_split.csv
  datasplit_mode: load
  fc_input: false
  flatten: true
  groups:
  - HC
  - MCI
  - AD
  normalize: true
  pad_features: false
  preserve_timepoints: true
  random_seed: 42
  timepoints_as_samples: false
  transpose: false
  truncate_features: false
  use_bio_levels:
  - ABeta
filter:
  apply_demean: true
  apply_detrend: true
  apply_finalDetrend: false
  fhi: 0.08
  flp: 0.01
  k: 2
  remove_artifacts: true
  tr: 3000
  type: BandPassFilter
